# Wartungs-/Coming-Soon-nginx für app.edufunds.org.
# - Statische "Bald verfügbar"-Seite für ALLES.
# - AUSNAHME 1: /api/newsletter (POST Anmeldung + GET ?token Bestätigung) wird intern
#   an die laufende edufunds-app (Docker-Netzwerk) durchgereicht, damit das
#   Newsletter-Abo mit Double-Opt-in in die Prod-DB schreibt, ohne die restliche
#   App nach außen freizulegen.
# - AUSNAHME 2 (08.07.2026): Admin-Bereich (/admin, /api/admin) + Newsletter-
#   Verwaltung (/api/newsletter/*) + die dafür nötigen App-Assets (/_next/*) werden
#   ebenfalls durchgereicht, damit der Betreiber sich einloggen und den Newsletter
#   freigeben/testen kann, WÄHREND die Öffentlichkeit weiter Coming-Soon sieht.
#   Voll reversibel: diese Blöcke wieder entfernen → alles zurück auf Coming-Soon.
#   Die Admin-Endpunkte sind in der App selbst passwort-/JWT-geschützt.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Kanonische Domain = edufunds.org. www + app (+ alles andere) → 301 dorthin,
  # damit die Plattform-Adresse schon in der Coming-Soon-Phase eindeutig ist
  # (bereits versendete app.edufunds.org-Links bleiben so gültig). edufunds.org
  # selbst faellt durch zur Coming-Soon-Seite / den Admin-Proxy-Blöcken unten.
  if ($host != "edufunds.org") {
    return 301 https://edufunds.org$request_uri;
  }

  # Gemeinsame Proxy-Header (an alle durchgereichten Blöcke vererbt, sofern der
  # Block nicht selbst proxy_set_header setzt). Host $host ist wichtig, damit die
  # App die korrekte Origin/absolute URLs bildet (Login-Origin-Check!).
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Newsletter: einziger durchgereichter Endpoint. Resolver, damit ein
  # (Neu-)Start von edufunds-app die Auflösung nicht dauerhaft cached.
  resolver 127.0.0.11 valid=10s;
  location = /api/newsletter {
    set $upstream http://edufunds-app:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 20s;
    # Wenn die App (noch) nicht läuft: sauberer 503 statt nginx-Fehlerseite.
    proxy_intercept_errors on;
    error_page 502 503 504 = @news_down;
  }

  location @news_down {
    default_type application/json;
    return 503 '{"success":false,"message":"Anmeldung gerade nicht möglich. Bitte später erneut versuchen."}';
  }

  # --- Admin + Newsletter-Verwaltung + App-Assets an die App durchreichen ---
  # (Interim-Zugang für Betrieb, während die Öffentlichkeit Coming-Soon sieht.)
  location /admin {
    set $upstream_admin http://edufunds-app:3000;
    proxy_pass $upstream_admin;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }
  location /api/admin {
    set $upstream_apiadmin http://edufunds-app:3000;
    proxy_pass $upstream_apiadmin;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }
  # Newsletter-Verwaltung (issues/send/preview). Der öffentliche Anmelde-Endpoint
  # ist die EXAKTE Location "= /api/newsletter" oben und hat Vorrang.
  location /api/newsletter/ {
    set $upstream_nl http://edufunds-app:3000;
    proxy_pass $upstream_nl;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }
  # Next.js-Assets (JS/CSS/Chunks) — nötig, damit die Admin-/Login-UI rendert.
  location /_next/ {
    set $upstream_next http://edufunds-app:3000;
    proxy_pass $upstream_next;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }

  # Coming-Soon-Phase: NICHT indexieren. Echtes robots.txt (statt HTML).
  location = /robots.txt {
    default_type text/plain;
    return 200 "User-agent: *\nDisallow: /\n";
  }

  # Alles andere -> Coming-Soon-Seite (auch unbekannte Pfade), nie die App.
  location / {
    try_files /index.html =404;
  }
}
