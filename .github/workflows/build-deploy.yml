name: Build and Deploy EduFunds

# 2026-06-09: `staging` aus den Push-Triggern entfernt — Staging wird manuell
# ueber ./scripts/deploy-staging.sh deployt (s. deploy-staging.yml).
# 2026-06-16: auch `main` aus den Push-Triggern entfernt. Dieser Workflow baute
# das ghcr-`:latest`-Image ohne --build-arg (Dockerfile-Default MOCK=0 = Paywall
# scharf). Solange der Pilot bewusst mit Dev-Mock-Bypass laeuft, soll bei jedem
# main-Push kein MOCK=0-`:latest` veroeffentlicht werden. Nur noch manuell.
# Der Build-Schritt setzt zusaetzlich MOCK=1. VOR Zahlungs-Go-Live: Push-Trigger
# reaktivieren UND MOCK=1 entfernen.
on:
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build Next.js
      run: npm run build
      env:
        NODE_ENV: production
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix={{branch}}-
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # KEIN --build-arg NEXT_PUBLIC_PAYWALL_DEV_MOCK: es gilt der Dockerfile-Default 0,
        # d. h. die Zahlungs-Paywall ist SCHARF. Bis 14.07.2026 stand hier fest MOCK=1 —
        # ein manueller Dispatch haette ein Image gebaut, in dem sich die Paywall ueber
        # /api/wizard/checkout/dev-mock kostenlos umgehen laesst.
        # Fuer Pilot-/UAT-Builds gibt es den bewussten Weg:
        #   ./scripts/deploy-production.sh --with-paywall-bypass
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
