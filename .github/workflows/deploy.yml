name: Deploy to Production (Hetzner Docker)

# ACHTUNG (2026-06-16): Auto-Deploy bei Push auf `main` ist DEAKTIVIERT.
# Grund: Dieser Workflow baute das Image ohne --build-arg, d.h. mit Dockerfile-
# Default NEXT_PUBLIC_PAYWALL_DEV_MOCK=0 -> Zahlungs-Paywall scharf. Solange
# Stripe-Live (Live-Keys/Webhook/Testkauf) nicht fertig ist, laeuft der Pilot
# bewusst mit Dev-Mock-Bypass (MOCK=1). Production wird daher MANUELL ueber
# ./scripts/deploy-production.sh deployt (baut mit --build-arg ...MOCK=1).
# Der Build-Schritt unten setzt zur Absicherung ebenfalls MOCK=1, falls dieser
# Workflow manuell (workflow_dispatch) ausgeloest wird.
# VOR echtem Zahlungs-Go-Live: Push-Trigger wieder aktivieren UND MOCK=1 entfernen.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Docker to Hetzner
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        # MOCK=1 bis Stripe-Live fertig ist (s. Kopf-Kommentar). Vor Go-Live entfernen.
        run: |
          docker build --build-arg NEXT_PUBLIC_PAYWALL_DEV_MOCK=1 -t edufunds:latest .
          docker save edufunds:latest | gzip > edufunds-image.tar.gz
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to Hetzner
        run: |
          echo "🚀 Deploying Docker image to Hetzner..."
          
          # Copy image to server
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            edufunds-image.tar.gz \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:/tmp/
          
          # Load and deploy on server
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} << 'EOF'
            echo "📦 Loading Docker image..."
            docker load < /tmp/edufunds-image.tar.gz
            
            echo "🛑 Stopping old container..."
            docker stop edufunds-app 2>/dev/null || true
            docker rm edufunds-app 2>/dev/null || true
            
            echo "🚀 Starting new container..."
            docker run -d --name edufunds-app \
              --network hetzner-stack_web \
              --env-file /home/edufunds/edufunds-app/.env.production \
              -e NODE_ENV=production \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -l 'traefik.enable=true' \
              -l 'traefik.docker.network=hetzner-stack_web' \
              -l 'traefik.http.routers.edufunds-app.rule=Host(`app.edufunds.org`)' \
              -l 'traefik.http.routers.edufunds-app.entrypoints=websecure' \
              -l 'traefik.http.routers.edufunds-app.tls=true' \
              -l 'traefik.http.routers.edufunds-app.tls.certresolver=letsencrypt' \
              -l 'traefik.http.routers.edufunds-app.service=edufunds-app-service' \
              -l 'traefik.http.services.edufunds-app-service.loadbalancer.server.port=3000' \
              --restart unless-stopped \
              edufunds:latest
            
            echo "⏳ Waiting for container to be healthy..."
            sleep 10
            
            echo "🔍 Checking container status..."
            docker ps | grep edufunds-app
            docker logs edufunds-app --tail 5
            
            echo "🧹 Cleaning up..."
            rm /tmp/edufunds-image.tar.gz
            
            echo "✅ Deployment completed!"
          EOF
      
      - name: Health Check
        run: |
          echo "🏥 Running health check..."
          sleep 5
          curl -sI https://app.edufunds.org | head -3 || echo "⚠️ Health check warning"
